server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name __GIST_DOMAIN__;

    include snippets/mirror-resolver.conf;

    root /www/wwwroot/github-mirror/gist;
    index index.html;

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    include snippets/mirror-security.conf;
    include snippets/mirror-robots-deny.conf;

    access_log __LOG_DIR__/__GIST_DOMAIN__.access.log;
    error_log  __LOG_DIR__/__GIST_DOMAIN__.error.log warn;

    error_page 403 /errors/403-readonly.html;
    error_page 418 /errors/403-login-disabled.html;
    error_page 404 /errors/404.html;

    location = /errors/403-readonly.html {
        internal;
        alias __ERROR_ROOT__/403-readonly.html;
    }

    location = /errors/403-login-disabled.html {
        internal;
        alias __ERROR_ROOT__/403-login-disabled.html;
    }

    location = /errors/404.html {
        internal;
        alias __ERROR_ROOT__/404.html;
    }

    include snippets/mirror-readonly-methods.conf;
    include snippets/mirror-block-sensitive-paths.conf;

    location = / {
        rewrite ^ /starred last;
    }

    location /gist-githubusercontent/ {
        include snippets/proxy-common.conf;

        set $gist_raw_origin gist.githubusercontent.com;
        proxy_ssl_name $gist_raw_origin;
        proxy_set_header Host $gist_raw_origin;
        rewrite ^/gist-githubusercontent/(.*)$ /$1 break;
        proxy_pass https://$gist_raw_origin;

        proxy_hide_header Set-Cookie;

        add_header X-Mirror-Gist "gist-raw" always;
    }

    location / {
        include snippets/proxy-common.conf;

        set $gist_page_origin gist.github.com;
        proxy_ssl_name $gist_page_origin;
        proxy_pass https://$gist_page_origin$request_uri;
        proxy_set_header Host $gist_page_origin;
        proxy_set_header Referer https://gist.github.com/;
        proxy_set_header Origin https://gist.github.com;

        proxy_hide_header referrer-policy;
        proxy_hide_header content-security-policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header x-pjax-url;

        proxy_set_header Accept-Encoding "";

        proxy_redirect https://gist.github.com https://__GIST_DOMAIN__;
        proxy_redirect https://gist.githubusercontent.com https://__GIST_DOMAIN__/gist-githubusercontent/;
        proxy_redirect https://codeload.github.com https://__ARCHIVE_DOMAIN__;

        include snippets/mirror-subfilter-gist-html.conf;
    }
}
