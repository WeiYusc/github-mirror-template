server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name __HUB_DOMAIN__;

    root /www/wwwroot/github-mirror/hub;
    index index.html;

    include snippets/tls-common.conf;
    include snippets/mirror-security.conf;
    include snippets/mirror-robots-deny.conf;

    access_log __LOG_DIR__/__HUB_DOMAIN__.access.log;
    error_log  __LOG_DIR__/__HUB_DOMAIN__.error.log warn;

    error_page 403 /errors/403-readonly.html;
    error_page 418 /errors/403-login-disabled.html;
    error_page 404 /errors/404.html;

    location = /errors/403-readonly.html {
        internal;
        alias __ERROR_ROOT__/403-readonly.html;
    }

    location = /errors/403-login-disabled.html {
        internal;
        alias __ERROR_ROOT__/403-login-disabled.html;
    }

    location = /errors/404.html {
        internal;
        alias __ERROR_ROOT__/404.html;
    }

    include snippets/mirror-readonly-methods.conf;
    include snippets/mirror-block-sensitive-paths.conf;

    location ~ ^/[^/]+/[^/]+/archive/ {
        return 301 https://__ARCHIVE_DOMAIN__$request_uri;
    }

    location ~ ^/[^/]+/[^/]+/releases/download/ {
        return 301 https://__DOWNLOAD_DOMAIN__$request_uri;
    }

    location ~ ^/[^/]+/[^/]+/suites/[^/]+/artifacts/ {
        return 301 https://__DOWNLOAD_DOMAIN__$request_uri;
    }

    location / {
        include snippets/proxy-common.conf;

        proxy_pass https://github.com;
        proxy_set_header Host github.com;
        proxy_set_header Referer https://github.com/;
        proxy_set_header Origin https://github.com;

        proxy_hide_header referrer-policy;
        proxy_hide_header content-security-policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header x-pjax-url;

        proxy_set_header Accept-Encoding "";

        add_header x-pjax-url "https://__HUB_DOMAIN__$request_uri" always;

        proxy_redirect https://github.com https://__HUB_DOMAIN__;
        proxy_redirect https://raw.githubusercontent.com https://__RAW_DOMAIN__;
        proxy_redirect https://gist.github.com https://__GIST_DOMAIN__;
        proxy_redirect https://codeload.github.com https://__ARCHIVE_DOMAIN__;
        proxy_redirect https://github.githubassets.com https://__ASSETS_DOMAIN__;

        include snippets/mirror-subfilter-html.conf;
    }
}
