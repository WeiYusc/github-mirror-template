upstream github_assets_entry {
    server github.githubassets.com:443;
    keepalive 32;
}

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name __ASSETS_DOMAIN__;

    root /www/wwwroot/github-mirror/assets;
    index index.html;

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    include snippets/mirror-security.conf;
    include snippets/mirror-robots-deny.conf;

    access_log __LOG_DIR__/__ASSETS_DOMAIN__.access.log;
    error_log  __LOG_DIR__/__ASSETS_DOMAIN__.error.log warn;

    error_page 403 /errors/403-readonly.html;
    error_page 404 /errors/404.html;

    location = /errors/403-readonly.html {
        internal;
        alias __ERROR_ROOT__/403-readonly.html;
    }

    location = /errors/404.html {
        internal;
        alias __ERROR_ROOT__/404.html;
    }

    include snippets/mirror-readonly-methods.conf;
    include snippets/proxy-common.conf;
    include snippets/mirror-cache-static.conf;

    location = / {
        return 404;
    }

    location / {
        resolver 8.8.8.8 1.1.1.1 valid=300s ipv6=off;
        resolver_timeout 5s;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name github.githubassets.com;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_set_header Host github.githubassets.com;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        set $assets_origin github.githubassets.com;
        proxy_pass https://$assets_origin;

        proxy_hide_header Set-Cookie;

        add_header X-Mirror-Asset "github-assets" always;
    }
}
