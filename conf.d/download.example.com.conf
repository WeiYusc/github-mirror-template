server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name __DOWNLOAD_DOMAIN__;

    include snippets/mirror-resolver.conf;

    root /www/wwwroot/github-mirror/download;
    index index.html;

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    include snippets/mirror-security.conf;
    include snippets/mirror-robots-deny.conf;

    access_log __LOG_DIR__/__DOWNLOAD_DOMAIN__.access.log;
    error_log  __LOG_DIR__/__DOWNLOAD_DOMAIN__.error.log warn;

    error_page 403 /errors/403-readonly.html;
    error_page 404 /errors/404.html;

    location = /errors/403-readonly.html {
        internal;
        alias __ERROR_ROOT__/403-readonly.html;
    }

    location = /errors/404.html {
        internal;
        alias __ERROR_ROOT__/404.html;
    }

    include snippets/mirror-readonly-methods.conf;
    include snippets/mirror-download-common.conf;

    location ~ ^/[^/]+/[^/]+/releases/download/ {
        set $github_download_origin github.com;
        proxy_ssl_server_name on;
        proxy_ssl_name $github_download_origin;
        proxy_pass https://$github_download_origin$request_uri;
        proxy_set_header Host $github_download_origin;

        error_page 301 302 307 = @handle_redirect;
    }

    location ~ ^/[^/]+/[^/]+/suites/[^/]+/artifacts/ {
        set $github_download_origin github.com;
        proxy_ssl_server_name on;
        proxy_ssl_name $github_download_origin;
        proxy_pass https://$github_download_origin$request_uri;
        proxy_set_header Host $github_download_origin;

        error_page 301 302 307 = @handle_redirect;
    }

    location @handle_redirect {
        set $redirect_target $upstream_http_location;

        if ($redirect_target = "") {
            return 502;
        }

        if ($gh_redirect_https_ok = 0) {
            return 403;
        }

        if ($gh_redirect_allowed = 0) {
            return 403;
        }

        proxy_ssl_name $proxy_host;
        proxy_pass $redirect_target;

        proxy_intercept_errors on;
        error_page 301 302 307 = @handle_redirect;
    }

    location / {
        return 404;
    }
}
