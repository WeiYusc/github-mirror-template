server {
    listen 80;
    listen 443 ssl http2;
    server_name github.example.com;

    root /www/wwwroot/github-mirror/hub;
    index index.html;

    include snippets/tls-common.conf;
    include snippets/mirror-security.conf;
    include snippets/mirror-robots-deny.conf;

    access_log /var/log/nginx/github.example.com.access.log;
    error_log  /var/log/nginx/github.example.com.error.log warn;

    error_page 403 /errors/403-readonly.html;
    error_page 404 /errors/404.html;

    location = /errors/403-readonly.html {
        internal;
        root /www/wwwroot/github-mirror-errors;
    }

    location = /errors/403-login-disabled.html {
        internal;
        root /www/wwwroot/github-mirror-errors;
    }

    location = /errors/404.html {
        internal;
        root /www/wwwroot/github-mirror-errors;
    }

    include snippets/mirror-readonly-methods.conf;
    include snippets/mirror-block-sensitive-paths.conf;

    location ~ ^/[^/]+/[^/]+/archive/ {
        return 301 https://archive.github.example.com$request_uri;
    }

    location ~ ^/[^/]+/[^/]+/releases/download/ {
        return 301 https://download.github.example.com$request_uri;
    }

    location ~ ^/[^/]+/[^/]+/suites/[^/]+/artifacts/ {
        return 301 https://download.github.example.com$request_uri;
    }

    location / {
        include snippets/proxy-common.conf;

        proxy_pass https://github.com;
        proxy_set_header Host github.com;
        proxy_set_header Referer https://github.com/;
        proxy_set_header Origin https://github.com;

        proxy_hide_header referrer-policy;
        proxy_hide_header content-security-policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header x-pjax-url;

        proxy_set_header Accept-Encoding "";

        add_header x-pjax-url "https://github.example.com$request_uri" always;

        proxy_redirect https://github.com https://github.example.com;
        proxy_redirect https://raw.githubusercontent.com https://raw.github.example.com;
        proxy_redirect https://gist.github.com https://gist.github.example.com;
        proxy_redirect https://codeload.github.com https://archive.github.example.com;
        proxy_redirect https://github.githubassets.com https://assets.github.example.com;

        include snippets/mirror-subfilter-html.conf;
    }
}
