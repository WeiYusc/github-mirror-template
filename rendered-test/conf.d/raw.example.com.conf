upstream github_raw_entry {
    server raw.githubusercontent.com:443;
    keepalive 32;
}

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name raw.github.example.com;

    root /www/wwwroot/github-mirror/raw;
    index index.html;

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    include snippets/mirror-security.conf;
    include snippets/mirror-robots-deny.conf;

    access_log /var/log/nginx/raw.github.example.com.access.log;
    error_log  /var/log/nginx/raw.github.example.com.error.log warn;

    error_page 403 /errors/403-readonly.html;
    error_page 404 /errors/404.html;

    location = /errors/403-readonly.html {
        internal;
        root /www/wwwroot/github-mirror-errors;
    }

    location = /errors/404.html {
        internal;
        root /www/wwwroot/github-mirror-errors;
    }

    include snippets/mirror-readonly-methods.conf;
    include snippets/proxy-common.conf;

    location / {
        resolver 8.8.8.8 1.1.1.1 valid=300s ipv6=off;
        resolver_timeout 5s;
        proxy_ssl_name raw.githubusercontent.com;
        proxy_set_header Host raw.githubusercontent.com;
        proxy_set_header Connection "";
        set $raw_origin raw.githubusercontent.com;
        proxy_pass https://$raw_origin;

        proxy_hide_header Set-Cookie;

        add_header X-Mirror-Raw "github-raw" always;
    }
}
